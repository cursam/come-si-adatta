<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fashion Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; border: 1px solid #444; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        img { max-width: 100%; border-radius: 10px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .loading { color: #ffcc00; font-style: italic; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>👕 AI Virtual Try-On</h1>
    
    <label>1. Carica la TUA foto (Persona):</label>
    <input type="file" id="personImg" accept="image/*">
    
    <label>2. Carica la foto del VESTITO:</label>
    <input type="file" id="garmentImg" accept="image/*">
    
    <button onclick="startInference()">GENERA OUTFIT ✨</button>
    
    <p id="status" class="loading">L'intelligenza artificiale sta lavorando... (circa 30s)</p>
    <div id="resultArea"></div>
</div>

<script>
async function startInference() {
    const token = "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"; // <--- METTI IL TUO TOKEN QUI!
    const personFile = document.getElementById('personImg').files[0];
    const garmentFile = document.getElementById('garmentImg').files[0];

    if (!personFile || !garmentFile) return alert("Devi caricare ENTRAMBE le foto!");
    if (token === "IL_TUO_TOKEN_QUI_DENTRO") return alert("Devi inserire il tuo Token di Hugging Face nel codice!");

    document.getElementById('status').style.display = 'block';

    try {
        // Usiamo un altro modello più semplice per l'API diretta (es. quello di Levihsu o simili)
        const response = await fetch("https://api-inference.huggingface.co/models/yisol/IDM-VTON", {
            headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            method: "POST",
            body: JSON.stringify({
                "inputs": {
                    "background": await toBase64(personFile),
                    "layers": [await toBase64(garmentFile)]
                }
            }),
        });

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById('resultArea').innerHTML = `<img src="${url}">`;
    } catch (e) {
        alert("Errore durante la generazione. Controlla il Token!");
    }
    document.getElementById('status').style.display = 'none';
}

const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
});
</script>

</body>
</html>
